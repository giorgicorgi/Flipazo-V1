<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />

  <!-- Primary SEO -->
  <title id="js-page-title">Blog — Flipazo</title>
  <meta name="description" id="js-meta-desc" content="Guías, análisis y consejos para comprar mejor. El blog de Flipazo." />
  <link rel="canonical" id="js-canonical" href="https://flipazo.es/blog.html" />

  <!-- Open Graph -->
  <meta property="og:type" id="js-og-type" content="website" />
  <meta property="og:title" id="js-og-title" content="Blog — Flipazo" />
  <meta property="og:description" id="js-og-desc" content="Guías, análisis y consejos para comprar mejor." />
  <meta property="og:image" id="js-og-image" content="https://flipazo.es/og-default.jpg" />
  <meta property="og:url" id="js-og-url" content="https://flipazo.es/blog.html" />
  <meta property="og:site_name" content="Flipazo" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" id="js-tw-title" content="Blog — Flipazo" />
  <meta name="twitter:description" id="js-tw-desc" content="Guías, análisis y consejos para comprar mejor." />
  <meta name="twitter:image" id="js-tw-image" content="https://flipazo.es/og-default.jpg" />

  <!-- Schema.org JSON-LD — updated dynamically per post -->
  <script type="application/ld+json" id="js-schema-ld">
  {
    "@context": "https://schema.org",
    "@type": "Blog",
    "name": "Flipazo Blog",
    "url": "https://flipazo.es/blog.html",
    "description": "Guías, análisis y consejos para comprar mejor."
  }
  </script>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23111111'/><text x='50%' y='74%' font-family='Georgia,serif' font-weight='900' font-size='24' fill='white' text-anchor='middle'>F</text></svg>" />

  <!-- marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Google Fonts — same as index.html -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Variables (aligned with index.html palette) ── */
    :root {
      --ink:          #111111;
      --ink-2:        #444444;
      --ink-3:        #777777;
      --paper:        #f4f2ef;
      --surface:      #ffffff;
      --border:       #d8d3c8;
      --border-soft:  #cccccc;
      --accent:       #c0392b;
      --accent-dk:    #922b21;
      --font-serif:   'Playfair Display', Georgia, 'Times New Roman', serif;
      --font-mono:    'Courier Prime', 'Courier New', Courier, monospace;
      --font-sans:    'Helvetica Neue', Arial, sans-serif;
      --max-w:        860px;
      --r:            4px;
    }

    /* ── Dark mode ── */
    @media (prefers-color-scheme: dark) {
      :root {
        --ink:         #e2e2e2;
        --ink-2:       #aaaaaa;
        --ink-3:       #888888;
        --paper:       #1a1918;
        --surface:     #232120;
        --border:      #363230;
        --border-soft: #3d3a38;
        --accent:      #e74c3c;
        --accent-dk:   #c0392b;
      }
    }

    /* ── Base ── */
    body {
      font-family: var(--font-sans);
      background: var(--paper);
      color: var(--ink);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Top accent bar (identidad index.html) ── */
    body::before {
      content: '';
      display: block;
      height: 4px;
      background: var(--accent);
    }

    /* ── Masthead (matches index.html visual identity) ── */
    .masthead {
      border-bottom: 3px double var(--border);
      padding: 22px 32px 16px;
      text-align: center;
      background: var(--surface);
    }

    .masthead__eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-2);
      margin-bottom: 8px;
    }

    .masthead__brand {
      font-family: var(--font-serif);
      font-size: clamp(42px, 8vw, 72px);
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--ink);
      text-decoration: none;
      display: inline-block;
      line-height: 1;
    }
    .masthead__brand span { color: var(--accent); }
    @media (prefers-color-scheme: dark) {
      .masthead { background: #1e1c1b; border-color: #3a3634; }
    }

    .masthead__rule {
      border: none;
      border-top: 1.5px solid var(--border);
      margin: 14px 0 10px;
    }

    .masthead__nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 28px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-2);
    }
    .masthead__nav a { color: var(--ink-2); transition: color 0.15s; }
    .masthead__nav a:hover { color: var(--accent); }
    .masthead__nav a.active {
      color: var(--accent);
      font-weight: 700;
      border-bottom: 2px solid var(--accent);
      padding-bottom: 2px;
    }

    /* ── Layout ── */
    .container {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Blog list view ── */
    #view-list { padding: 44px 0 60px; }

    .blog-header {
      border-bottom: 2px solid var(--ink);
      padding-bottom: 14px;
      margin-bottom: 36px;
    }
    .blog-header__label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 8px;
    }
    .blog-header h1 {
      font-family: var(--font-serif);
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 900;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }
    .blog-header__desc {
      color: var(--ink-3);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.04em;
      margin-top: 8px;
    }

    /* ── Post cards grid ── */
    .posts-grid {
      display: grid;
      gap: 0;
    }

    .post-card {
      display: grid;
      grid-template-columns: 1fr;
      border-bottom: 1px solid var(--border);
      padding: 28px 0;
      cursor: pointer;
      gap: 14px;
      transition: background 0.15s;
    }
    .post-card:first-child { border-top: 1px solid var(--border); }
    .post-card:hover { background: var(--surface); margin: 0 -24px; padding-left: 24px; padding-right: 24px; }

    @media (min-width: 600px) {
      .post-card {
        grid-template-columns: 200px 1fr;
        align-items: start;
        gap: 22px;
      }
      .post-card--no-img {
        grid-template-columns: 1fr;
      }
    }

    .post-card__img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: var(--r);
      background: var(--border);
      display: block;
    }
    .post-card__body { display: flex; flex-direction: column; gap: 8px; }
    .post-card__meta {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-3);
    }
    .post-card__title {
      font-family: var(--font-serif);
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 700;
      line-height: 1.25;
      color: var(--ink);
    }
    .post-card:hover .post-card__title { color: var(--accent); }
    .post-card__excerpt {
      font-size: 14px;
      color: var(--ink-2);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .post-card__tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 2px;
    }
    .post-card__tag {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--ink-3);
    }
    .post-card__readmore {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-top: auto;
    }

    .empty-blog {
      text-align: center;
      padding: 80px 20px;
      color: var(--ink-3);
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 20px;
    }

    /* ── Single post view ── */
    #view-post { display: none; padding: 40px 0 72px; }

    .post-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-3);
      cursor: pointer;
      margin-bottom: 32px;
      transition: color 0.15s;
    }
    .post-back:hover { color: var(--accent); }
    .post-back svg { flex-shrink: 0; }

    .post-hero-img {
      width: 100%;
      max-height: 420px;
      object-fit: cover;
      border-radius: var(--r);
      margin-bottom: 32px;
      display: block;
    }

    .post-meta {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 14px;
    }
    .post-title {
      font-family: var(--font-serif);
      font-size: clamp(28px, 5vw, 46px);
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: -0.5px;
      margin-bottom: 18px;
    }
    .post-excerpt {
      font-size: 18px;
      color: var(--ink-2);
      line-height: 1.6;
      border-left: 3px solid var(--accent);
      padding-left: 18px;
      margin-bottom: 20px;
      font-style: italic;
      font-family: var(--font-serif);
    }

    /* ── Tags on post page ── */
    .post-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 28px;
    }
    .post-tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--ink-3);
      font-family: 'Courier New', monospace;
      transition: border-color 0.15s, color 0.15s;
    }
    .post-tag:hover { border-color: var(--accent); color: var(--accent); }

    .post-divider {
      border: none;
      border-top: 2px solid var(--ink);
      margin: 0 0 36px;
    }

    /* ── Markdown content ── */
    .post-content {
      font-size: 17px;
      line-height: 1.8;
      color: var(--ink);
    }
    .post-content h1,
    .post-content h2,
    .post-content h3,
    .post-content h4 {
      font-family: var(--font-serif);
      margin: 2em 0 0.6em;
      line-height: 1.25;
      color: var(--ink);
    }
    .post-content h2 {
      font-size: 1.5em;
      border-bottom: 1.5px solid var(--border);
      padding-bottom: 6px;
    }
    .post-content h3 { font-size: 1.2em; }
    .post-content h4 { font-size: 1em; font-weight: 700; }
    .post-content p { margin-bottom: 1.3em; }
    .post-content ul,
    .post-content ol { margin: 0 0 1.3em 1.8em; }
    .post-content li { margin-bottom: 0.45em; }
    .post-content strong { font-weight: 700; }
    .post-content em { font-style: italic; }
    .post-content a { color: var(--accent); text-decoration: underline; text-decoration-color: transparent; transition: text-decoration-color 0.15s; }
    .post-content a:hover { text-decoration-color: var(--accent); }
    .post-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 18px;
      margin: 1.8em 0;
      color: var(--ink-2);
      font-style: italic;
      font-family: var(--font-serif);
    }
    .post-content code {
      background: var(--border);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.88em;
      font-family: var(--font-mono);
    }
    .post-content pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 18px;
      overflow-x: auto;
      margin-bottom: 1.3em;
    }
    .post-content pre code { background: none; padding: 0; }
    .post-content img { max-width: 100%; border-radius: var(--r); margin: 1.2em 0; display: block; }
    .post-content table { width: 100%; border-collapse: collapse; margin-bottom: 1.3em; font-size: 15px; }
    .post-content th,
    .post-content td { border: 1px solid var(--border); padding: 9px 14px; text-align: left; }
    .post-content th { background: var(--surface); font-weight: 700; font-family: var(--font-serif); }
    .post-content hr { border: none; border-top: 1px solid var(--border); margin: 2.2em 0; }

    /* ── Spinner ── */
    .spinner {
      text-align: center;
      padding: 72px 20px;
      color: var(--ink-3);
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.06em;
    }

    /* ── Footer (matches index.html) ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 24px;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--ink-3);
    }
    footer a { color: var(--ink-3); transition: color 0.15s; }
    footer a:hover { color: var(--accent); }
    footer .sep { margin: 0 8px; opacity: 0.5; }

    /* ── Responsive tweaks ── */
    @media (max-width: 480px) {
      .masthead { padding: 18px 20px 14px; }
      .container { padding: 0 16px; }
      .post-card:hover { margin: 0 -16px; padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>
<body>

  <!-- Masthead -->
  <header class="masthead">
    <p class="masthead__eyebrow">Las mejores ofertas de España</p>
    <a href="/" class="masthead__brand">Flip<span>azo</span></a>
    <hr class="masthead__rule" />
    <nav class="masthead__nav" aria-label="Navegación principal">
      <a href="/">Ofertas</a>
      <a href="/blog.html" class="active" aria-current="page">Blog</a>
    </nav>
  </header>

  <!-- Vista: lista de posts -->
  <main id="view-list">
    <div class="container">
      <div class="blog-header">
        <p class="blog-header__label">Blog</p>
        <h1>Guías &amp; Análisis</h1>
        <p class="blog-header__desc">Consejos para comprar mejor, guías de producto y análisis de mercado.</p>
      </div>
      <div class="posts-grid" id="js-posts-grid" role="list">
        <div class="spinner">Cargando…</div>
      </div>
    </div>
  </main>

  <!-- Vista: post individual -->
  <article id="view-post" aria-live="polite">
    <div class="container">

      <button class="post-back" id="js-back" aria-label="Volver al blog">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Volver al blog
      </button>

      <img id="js-post-img" class="post-hero-img" src="" alt="" />

      <p class="post-meta" id="js-post-meta"></p>
      <h1 class="post-title" id="js-post-title"></h1>
      <p class="post-excerpt" id="js-post-excerpt"></p>

      <!-- Tags -->
      <div id="js-post-tags" class="post-tags" style="display:none" aria-label="Etiquetas"></div>

      <hr class="post-divider" />
      <div class="post-content" id="js-post-content"></div>

    </div>
  </article>

  <footer>
    <a href="/">Flipazo</a>
    <span class="sep">·</span>
    <a href="/aviso-legal.html">Aviso legal</a>
    <span class="sep">·</span>
    <a href="/privacidad.html">Privacidad</a>
    <span class="sep">·</span>
    <a href="/cookies.html">Cookies</a>
  </footer>

  <script>
    "use strict";

    const API = "https://api.flipazo.es";
    const DEFAULT_OG_IMAGE = "https://flipazo.es/og-default.jpg";

    /* ── Helpers ── */
    function fmtDate(iso) {
      if (!iso) return "";
      return new Date(iso).toLocaleDateString("es-ES", {
        day: "numeric", month: "long", year: "numeric"
      });
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    /* ── SEO / meta helpers ── */
    function updateMeta(post) {
      const title = post.og_title || post.titulo || "";
      const desc  = post.meta_description || post.resumen || "Artículo del blog de Flipazo.";
      const img   = post.imagen_url || DEFAULT_OG_IMAGE;
      const url   = `https://flipazo.es/blog/${post.slug}`;

      document.getElementById("js-page-title").textContent    = `${post.titulo} — Flipazo Blog`;
      document.getElementById("js-meta-desc").content         = desc;
      document.getElementById("js-canonical").href            = url;
      document.getElementById("js-og-type").content           = "article";
      document.getElementById("js-og-title").content          = title;
      document.getElementById("js-og-desc").content           = desc;
      document.getElementById("js-og-image").content          = img;
      document.getElementById("js-og-url").content            = url;
      document.getElementById("js-tw-title").content          = title;
      document.getElementById("js-tw-desc").content           = desc;
      document.getElementById("js-tw-image").content          = img;

      // Schema.org JSON-LD — Article / FAQPage / HowTo based on schema_type
      const schemaType = post.schema_type || "Article";
      const schema = {
        "@context": "https://schema.org",
        "@type": schemaType,
        "headline": post.titulo,
        "description": desc,
        "datePublished": post.created_at,
        "dateModified": post.updated_at || post.created_at,
        "author": {
          "@type": "Organization",
          "name": "Flipazo",
          "url": "https://flipazo.es"
        },
        "publisher": {
          "@type": "Organization",
          "name": "Flipazo",
          "url": "https://flipazo.es"
        },
        "url": url,
        "mainEntityOfPage": { "@type": "WebPage", "@id": url }
      };
      if (img && img !== DEFAULT_OG_IMAGE) schema.image = img;
      if (post.tags) schema.keywords = post.tags;

      document.getElementById("js-schema-ld").textContent = JSON.stringify(schema, null, 2);
    }

    function resetMeta() {
      const defaultDesc = "Guías, análisis y consejos para comprar mejor. El blog de Flipazo.";
      const defaultTitle = "Blog — Flipazo";

      document.getElementById("js-page-title").textContent    = defaultTitle;
      document.getElementById("js-meta-desc").content         = defaultDesc;
      document.getElementById("js-canonical").href            = "https://flipazo.es/blog.html";
      document.getElementById("js-og-type").content           = "website";
      document.getElementById("js-og-title").content          = defaultTitle;
      document.getElementById("js-og-desc").content           = defaultDesc;
      document.getElementById("js-og-image").content          = DEFAULT_OG_IMAGE;
      document.getElementById("js-og-url").content            = "https://flipazo.es/blog.html";
      document.getElementById("js-tw-title").content          = defaultTitle;
      document.getElementById("js-tw-desc").content           = defaultDesc;
      document.getElementById("js-tw-image").content          = DEFAULT_OG_IMAGE;

      document.getElementById("js-schema-ld").textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "Blog",
        "name": "Flipazo Blog",
        "url": "https://flipazo.es/blog.html",
        "description": defaultDesc
      });
    }

    /* ── Views ── */
    function showList() {
      document.getElementById("view-list").style.display = "";
      document.getElementById("view-post").style.display = "none";
      resetMeta();
      history.pushState({}, "", "/blog.html");
    }

    function showPost(post) {
      document.getElementById("view-list").style.display = "none";
      const vp = document.getElementById("view-post");
      vp.style.display = "";

      // Hero image
      const img = document.getElementById("js-post-img");
      if (post.imagen_url) {
        img.src = post.imagen_url;
        img.alt = post.titulo || "";
        img.style.display = "block";
      } else {
        img.style.display = "none";
        img.src = "";
      }

      // Meta line
      const metaParts = [fmtDate(post.created_at)];
      document.getElementById("js-post-meta").textContent = metaParts.join(" · ");

      // Title
      document.getElementById("js-post-title").textContent = post.titulo || "";

      // Excerpt / resumen
      const ex = document.getElementById("js-post-excerpt");
      if (post.resumen) {
        ex.textContent = post.resumen;
        ex.style.display = "";
      } else {
        ex.style.display = "none";
      }

      // Tags
      const tagsEl = document.getElementById("js-post-tags");
      if (post.tags) {
        tagsEl.innerHTML = post.tags.split(",")
          .map(t => `<span class="post-tag">${escHtml(t.trim())}</span>`)
          .join("");
        tagsEl.style.display = "flex";
      } else {
        tagsEl.style.display = "none";
      }

      // Markdown content
      const raw = post.contenido || "";
      document.getElementById("js-post-content").innerHTML =
        typeof marked !== "undefined"
          ? marked.parse(raw)
          : raw.replace(/\n/g, "<br>");

      // SEO / meta
      updateMeta(post);

      history.pushState({ slug: post.slug }, "", `/blog/${post.slug}`);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    /* ── Data loading ── */
    async function loadList() {
      const grid = document.getElementById("js-posts-grid");
      try {
        const data = await fetch(`${API}/blog?limit=50`).then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.json();
        });

        if (!data.posts || !data.posts.length) {
          grid.innerHTML = `<div class="empty-blog">Próximamente — el blog está en construcción.</div>`;
          return;
        }

        grid.innerHTML = data.posts.map(p => {
          const tagsHtml = p.tags
            ? p.tags.split(",").map(t => `<span class="post-card__tag">${escHtml(t.trim())}</span>`).join("")
            : "";

          return `
          <div class="post-card${p.imagen_url ? "" : " post-card--no-img"}" data-slug="${escHtml(p.slug)}" role="listitem" tabindex="0" aria-label="${escHtml(p.titulo)}">
            ${p.imagen_url
              ? `<img class="post-card__img" src="${escHtml(p.imagen_url)}" alt="${escHtml(p.titulo)}" loading="lazy" onerror="this.style.display='none'" />`
              : ""}
            <div class="post-card__body">
              <p class="post-card__meta">${fmtDate(p.created_at)}</p>
              <h2 class="post-card__title">${escHtml(p.titulo)}</h2>
              ${p.resumen ? `<p class="post-card__excerpt">${escHtml(p.resumen)}</p>` : ""}
              ${tagsHtml ? `<div class="post-card__tags">${tagsHtml}</div>` : ""}
              <span class="post-card__readmore">Leer artículo →</span>
            </div>
          </div>`;
        }).join("");

        grid.querySelectorAll(".post-card").forEach(card => {
          const handler = () => loadPost(card.dataset.slug);
          card.addEventListener("click", handler);
          card.addEventListener("keydown", e => {
            if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handler(); }
          });
        });

      } catch (e) {
        grid.innerHTML = `<div class="empty-blog">Error al cargar el blog. Inténtalo de nuevo.</div>`;
        console.error("[blog] loadList error:", e);
      }
    }

    async function loadPost(slug) {
      try {
        const post = await fetch(`${API}/blog/${encodeURIComponent(slug)}`).then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.json();
        });
        showPost(post);
      } catch (e) {
        console.error("[blog] loadPost error:", e);
        // Fall back to list view on error
        showList();
        loadList();
      }
    }

    /* ── Event listeners ── */
    document.getElementById("js-back").addEventListener("click", () => {
      showList();
      if (!document.getElementById("js-posts-grid").querySelector(".post-card")) {
        loadList();
      }
    });

    window.addEventListener("popstate", e => {
      const path = location.pathname;
      const slugMatch = path.match(/^\/blog\/(.+)/);
      if (slugMatch) {
        loadPost(slugMatch[1]);
      } else {
        showList();
      }
    });

    /* ── Init: route on page load ── */
    (async () => {
      const path = location.pathname;
      const slugMatch = path.match(/^\/blog\/(.+)/);
      if (slugMatch) {
        // Show a minimal list in background so back button works immediately
        loadList();
        await loadPost(slugMatch[1]);
      } else {
        await loadList();
      }
    })();
  </script>

</body>
</html>
